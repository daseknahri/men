services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
      target: website-production
    image: restaurant-template-website:latest
    restart: unless-stopped
    command: node website-server.js
    environment:
      - NODE_ENV=production
      - PORT=${WEBSITE_PORT:-3002}
      - DATA_FILE=/app/data/data.json
      - UPLOADS_DIR=/app/uploads
    ports:
      - "127.0.0.1:${WEBSITE_PORT:-3002}:${WEBSITE_PORT:-3002}"
    volumes:
      - app_data:/app/data
      - app_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${WEBSITE_PORT:-3002}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    # In Coolify, assign this service domain as: https://restaurant.example.com:3002

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin-production
    image: restaurant-template-admin:latest
    restart: unless-stopped
    command: node admin-server.js
    environment:
      - NODE_ENV=production
      - PORT=${ADMIN_PORT:-3102}
      - DATA_FILE=/app/data/data.json
      - UPLOADS_DIR=/app/uploads
      - AUTH_FILE=/app/data/auth.json
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-change-me-now}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
    ports:
      - "127.0.0.1:${ADMIN_PORT:-3102}:${ADMIN_PORT:-3102}"
    volumes:
      - app_data:/app/data
      - app_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${ADMIN_PORT:-3102}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    # In Coolify, assign this service domain as: https://admin.restaurant.example.com:3102

volumes:
  app_data:
  app_uploads:
