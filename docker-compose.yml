services:
  foody:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: foody-app:latest
    container_name: foody-app
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8090}:80"
    environment:
      - TZ=${TZ:-Africa/Casablanca}
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Coolify / Traefik labels (enable when routing via Traefik on VPS)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.foody.rule=Host(`${DOMAIN:-foody.localhost}`)"
      - "traefik.http.routers.foody.entrypoints=websecure"
      - "traefik.http.routers.foody.tls.certresolver=letsencrypt"
      - "traefik.http.services.foody.loadbalancer.server.port=80"

networks:
  default:
    name: foody-network
