<!DOCTYPE html>
<html lang="fr" id="htmlRoot">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu | Restaurant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Playfair+Display:wght@700&display=swap">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Playfair+Display:wght@700&display=swap"
            rel="stylesheet"></noscript>
    <link rel="preload" as="style" href="menu-page.css">
    <link rel="stylesheet" href="menu-page.css">
</head>


<body class="menu-page">

    <div class="mobile-wrapper is-landing">

        <!-- ═══════════ LANDING PAGE VIEW ═══════════ -->
        <div id="landingView">
            <!-- Top Nav on Landing -->
            <nav class="top-nav-bar">
                <div class="top-nav-left">
                    <!-- Language Dropdown -->
                    <div class="lang-dropdown" id="langDropdown">
                        <button class="lang-drop-btn" onclick="toggleLangDropdown()">
                            <span id="currentLangDisplay">FR</span>
                            <span class="chevron">▼</span>
                        </button>
                        <div class="lang-options" id="langOptions">
                            <div class="lang-opt" onclick="window.setLang('fr', this)"><span class="flag">🇫🇷</span> FR
                            </div>
                            <div class="lang-opt" onclick="window.setLang('en', this)"><span class="flag">🇬🇧</span> EN
                            </div>
                            <div class="lang-opt" onclick="window.setLang('ar', this)"><span class="flag">🇲🇦</span> AR
                            </div>
                        </div>
                    </div>
                </div>
                <div class="top-nav-right">
                    <button id="cartNavBtnLanding" class="nav-icon-btn nav-cart-btn" onclick="openDrawer()" style="display:none;"
                        data-i18n-title="confirm_cart_label" data-i18n-aria-label="confirm_cart_label" title="Cart" aria-label="Cart">
                        🛒 <span id="cartBadgeLanding" class="cart-badge">0</span>
                    </button>
                    <button class="nav-icon-btn" onclick="openHistory()" data-i18n-title="history_button_title" data-i18n-aria-label="history_button_title" title="History" aria-label="History">
                        🕒 <span id="histBadgeLanding" class="history-badge">0</span>
                    </button>
                    <a href="index.html" class="nav-icon-btn close-btn">✕</a>
                </div>
            </nav>

            <!-- Hero Image -->
            <div class="landing-hero">
                <img src="images/hero-default.svg" alt="Restaurant" class="landing-hero-img" id="landingHeroImage" width="1440" height="900" decoding="async" fetchpriority="high">
                <div class="landing-hero-overlay"></div>
            </div>

            <!-- Logo Overlap -->
            <div class="landing-logo-wrap menu-reveal-observe">
                <div class="landing-logo-circle">
                    <img src="" alt="Restaurant Logo" class="landing-logo-img" id="landingLogoImage" width="256" height="256" style="display:none;" decoding="async" fetchpriority="high">
                    <div class="landing-logo-fallback" id="landingLogoFallback">R</div>
                </div>
            </div>

            <!-- Restaurant Info -->
            <div class="landing-body">
                <h1 class="landing-rest-name menu-reveal-observe" id="landingRestaurantName">Restaurant</h1>
                <div id="statusBadge" class="status-badge landing-status menu-reveal-observe">
                    <span class="dot"></span> <span id="statusText" data-i18n="status_loading">Chargement...</span>
                </div>

                <!-- Game Banner (Replaces Pills) -->
                <div class="game-banner menu-reveal-observe" onclick="openGameModal()">
                    <div class="game-banner-main">
                        <span class="game-banner-icon">🎮</span>
                        <div>
                            <div class="gb-text" data-i18n="game_title">Qui paie l'addition ?</div>
                            <div class="game-banner-note" data-i18n="game_subtitle">Jouez pour passer le temps !
                            </div>
                        </div>
                    </div>
                    <div
                        class="game-banner-cta">
                        <span data-i18n="game_cta">JOUER</span></div>
                </div>

                <!-- Promo Banner -->
                <div class="promo-section-vibrant menu-reveal-observe">
                    <div class="promo-container-wrapper">
                        <div class="promo-inner-container">
                            <button class="promo-nav-btn prev" onclick="scrollPromo(-1)">❮</button>
                            <div id="promoCarousel">
                                <!-- Items injected by menu.js -->
                            </div>
                            <button class="promo-nav-btn next" onclick="scrollPromo(1)">❯</button>
                        </div>
                    </div>
                </div>

                <!-- View Menu Button -->
                <button class="view-menu-btn menu-reveal-observe" onclick="openSuperCatSheet()">
                    <span data-i18n="view_menu">Voir le Menu</span>
                </button>

                <!-- Info Rows -->
                <div class="info-section">
                    <div class="info-row is-actionable menu-reveal-observe" data-i18n-title="landing_map_title" title="Voir sur la carte">
                        <span class="info-icon">📍</span>
                        <span class="info-text" id="landingLocation"></span>
                    </div>
                    <div class="info-row is-actionable menu-reveal-observe" data-i18n-title="landing_call_title" title="Appeler">
                        <span class="info-icon">📞</span>
                        <span class="info-text" id="landingPhone"></span>
                    </div>
                    <div class="info-row is-actionable menu-reveal-observe" data-i18n-title="landing_social_title" title="Nos réseaux sociaux">
                        <span class="info-icon">📸</span>
                        <span class="info-text" id="landingSocial"></span>
                    </div>
                    <div class="info-row is-actionable menu-reveal-observe" data-i18n-title="landing_wifi_title" title="Code WiFi">
                        <span class="info-icon">📶</span>
                        <span class="info-text" id="landingWifi"></span>
                    </div>
                </div>

                <!-- Social Links -->
                <div class="social-links social-links-minimal menu-reveal-observe" id="menuLandingSocialLinks">
                    <a href="index.html" class="social-icon-link" data-i18n-aria-label="landing_home_title" aria-label="Home">&#127968;</a>
                </div>
            </div>
        </div>
        <!-- END LANDING VIEW -->

        <!-- ═══════════ MENU NAVIGATION VIEW ═══════════ -->
        <div id="menuNavigationView" style="display:none;">
            <!-- Top Nav for Menu -->
            <nav class="top-nav-bar menu-nav-bar">
                <div class="top-nav-left">
                    <button id="menuBackBtn" class="nav-icon-btn" onclick="menuGoBack()"
                        style="display:none;">←</button>
                    <div class="nav-breadcrumb" id="navBreadcrumb"></div>
                </div>
                <div class="top-nav-right">
                    <button id="cartNavBtnMenu" class="nav-icon-btn nav-cart-btn" onclick="openDrawer()" style="display:none;"
                        data-i18n-title="confirm_cart_label" data-i18n-aria-label="confirm_cart_label" title="Cart" aria-label="Cart">
                        🛒 <span id="cartBadgeMenu" class="cart-badge">0</span>
                    </button>
                    <button class="nav-icon-btn" onclick="openHistory()" data-i18n-title="history_button_title" data-i18n-aria-label="history_button_title" title="History" aria-label="History">
                        🕒 <span id="histBadgeMenu" class="history-badge">0</span>
                    </button>
                    <button class="nav-icon-btn" onclick="showLanding()">✕</button>
                </div>
            </nav>

            <!-- Hero banner in menu -->
            <div class="menu-nav-hero">
                <img src="images/hero-default.svg" alt="" class="menu-nav-hero-img" id="menuHeroImage" width="1440" height="900" decoding="async" fetchpriority="low">
                <div class="menu-nav-hero-overlay"></div>
                <div class="menu-nav-hero-title menu-reveal-observe" id="menuNavTitle" data-i18n="nav_menu">Menu</div>
            </div>

            <!-- Content Area -->
            <div class="menu-content-area menu-reveal-observe">
                <!-- Sub-category grid -->
                <div id="catNavWrapper" class="cat-nav-wrapper menu-reveal-observe" style="display:none;">
                    <h2 id="subCatTitle" class="menu-section-title subcat-title">
                    </h2>
                    <div id="catNavScroll" class="cat-nav-scroll">
                        <!-- Categories injected here -->
                    </div>
                </div>

                <!-- Search bar (shown in items view) -->
                <div class="menu-search-box menu-reveal-observe" id="menuSearchBox" style="display:none;">
                    <input type="text" id="menuSearch" placeholder="Rechercher un plat..." data-i18n-placeholder="menu_search_placeholder"
                        oninput="searchMenu(this.value)">
                </div>

                <!-- Menu Items -->
                <div id="menuContent" style="display:none;">
                    <!-- Menu items injected here -->
                </div>

                <!-- Global Featured Slider (Moved to bottom) -->
                <div id="featuredGlobal" class="featured-section" style="display:none;"></div>
            </div>
        </div>
        <!-- END MENU NAVIGATION VIEW -->

        <!-- GLOBAL UI ELEMENTS -->
        <!-- Global Home Bubble -->
        <div class="home-floating-hub" onclick="showLanding()">
            🏠
        </div>

    </div>

    <!-- SUPER CATEGORY BOTTOM SHEET -->
    <div id="superCatOverlay" class="overlay" onclick="closeSuperCatSheet()"></div>
    <div id="superCatSheet" class="super-cat-sheet">
        <button class="super-sheet-close" onclick="closeSuperCatSheet()" data-i18n-aria-label="modal_close" aria-label="Close">&times;</button>
        <h2 class="super-sheet-title" data-i18n="menu_select_title">Sélectionner un Menu</h2>
        <div id="superCatList">
            <!-- Injected by JS -->
        </div>
    </div>

    <!-- Dish Detail Page (Slide Up Overlay) -->
    <div id="dishPage" class="dish-page">
        <button class="dish-page-close" onclick="closeDishPage()" data-i18n-aria-label="modal_close" aria-label="Close">&times;</button>
        <div class="dish-page-header">
            <img id="dishPageImg" src="" alt="" class="dish-page-img" width="1200" height="900" decoding="async">
        </div>
        <div class="dish-page-body">
            <h2 id="dishPageName" class="dish-page-name"></h2>
            <div id="dishPagePrice" class="dish-page-price"></div>
            <p id="dishPageDesc" class="dish-page-desc"></p>
            <div id="dishPageLoveContainer" class="dish-page-love-row"></div>
            <div class="dish-page-footer">
                <button id="dishPageAddBtn" class="dish-add-btn" data-i18n="add_to_cart">AJOUTER AU PANIER</button>
            </div>
        </div>
    </div>

    <!-- History Overlay -->
    <div id="historyOverlay" class="history-overlay" onclick="closeHistory()">
        <div class="history-modal" onclick="event.stopPropagation()">
            <div class="history-header">
                <h2 data-i18n="history_title">Historique</h2>
                <button onclick="closeHistory()" class="history-close-btn" data-i18n-aria-label="modal_close" aria-label="Close">&times;</button>
            </div>
            <div id="historyContent">
                <p class="history-empty" data-i18n="history_empty">Aucune commande récente.</p>
            </div>
        </div>
    </div>

    <!-- Shared Overlay -->
    <div id="sharedOverlay" class="overlay" onclick="closeAllModals()"></div>

    <!-- Drawer (Cart Confirmation) -->
    <div id="cartDrawer" class="modal-sheet">
        <div class="modal-handle"></div>
        <div id="drawerContent"><!-- Drawer/Cart content here --></div>
    </div>

    <!-- Ticket Modal -->
    <div id="ticketModal" class="modal-sheet ticket-sheet">
        <div id="ticketContent"><!-- Digital Ticket here --></div>
    </div>

    <!-- Image Gallery Modal -->
    <div id="galleryOverlay" class="gallery-overlay" onclick="closeGallery()">
        <button class="gallery-close" onclick="closeGallery()">✕</button>
        <div class="gallery-container" onclick="event.stopPropagation()">
            <button class="gallery-nav gallery-prev" onclick="prevGalleryImage()">❮</button>
            <img id="galleryImg" src="" alt="Gallery Image" width="1200" height="900" decoding="async">
            <button class="gallery-nav gallery-next" onclick="nextGalleryImage()">❯</button>
        </div>
        <div class="gallery-info" onclick="event.stopPropagation()">
            <div id="galleryTitle" class="gallery-title"></div>
            <div id="galleryCount" class="gallery-count"></div>
        </div>
    </div>

    <script src="shared-public.js" defer></script>
    <script src="menu.js" defer></script>
</body>

</html>
